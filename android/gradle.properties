# Project-wide Gradle settings.

# Memory settings ko optimize kiya gaya hai taaki build crash na ho
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8

# Build speed badhane ke liye settings
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# AndroidX support (Must have)
android.useAndroidX=true
android.enableJetifier=true

# Sabhi architectures ke liye support
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64

# FIX: New Architecture ko 'false' rakhein agar build fail ho rahi hai
# Kayi libraries abhi bhi Fabric/TurboModules support nahi karti
newArchEnabled=true

# Hermes performance ke liye best hai, ise true hi rehne dein
hermesEnabled=true

# UI settings
edgeToEdgeEnabled=false